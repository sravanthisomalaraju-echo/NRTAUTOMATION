name: Nightly NRT Automation

# This section schedules the run
on:
  schedule:
    # Runs at 1:00 AM Mountain Time (which is 8:00 AM UTC)
    - cron: '24 7 * * *'
  # This allows you to click a button on GitHub to run it manually anytime
  workflow_dispatch: 

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Or your specific version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install selenium tabulate gspread google-auth google-auth-oauthlib requests urllib3

      - name: Generate Google Auth Token
        # This safely creates the token.json file in the root folder using your new secret
        run: |
          echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > token.json

      - name: Run Automation Script
        # We pass your username and password as environment variables
        env:
          PORTAL_USER: ${{ secrets.NRT_USERNAME }}
          PORTAL_PASS: ${{ secrets.NRT_PASSWORD }}
        run: |
          python -u tests/getDataTest.py

      - name: Upload Error Screenshot
        uses: actions/upload-artifact@v4
        if: failure() # Only uploads if the Python script crashes!
        with:
          name: headless-screenshot
          path: screenshots/

      - name: Get Current Date
        if: always()
        # Grabs the date in MM/DD/YYYY format and saves it to the environment
        run: echo "DATE_TODAY=$(date +'%m/%d/%Y')" >> $GITHUB_ENV

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: NRT Automation - Success! [${{ env.DATE_TODAY }}]
          body: The NRT extraction to Google Sheets completed successfully.
          to: sravanthi.somalaraju@dish.com 
          from: GitHub Actions NRT Bot